<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Worsened Layout Reproduction</title>
    <style>
        body {
            padding: 20px;
            font-family: sans-serif;
        }

        .mwe-math-mathml-a11y {
            /* Original hiding styles (simulated as removed by script, but let's keep them logic-wise/or assume script removes them) */
            /* For this repro, we assume the script successfully removed the hiding class/styles, 
                so we are just testing the CSS injection effects. */
        }

        /* REFINED CSS STRATEGY */

        /* 1. Force the root math element to be inline if it claims to be */
        math[display="inline"],
        math[style*="inline"],
        math {
            display: inline !important;
        }

        /* 2. Force the semantics wrapper (which often defaults to block/inline-block with wrong width) to be inline */
        math semantics {
            display: inline !important;
        }

        /* 3. Force mrow to be inline */
        math mrow {
            display: inline !important;
        }

        /* 4. DO NOT use wildcard * { display: inline-block } as it breaks tables */
    </style>
</head>

<body>
    <h1>Worsened Layout Reproduction (Matrix)</h1>
    <div id="container" style="width: 800px; border: 1px solid #ccc;">
        <!-- User snippet -->
        <p style="outline: none;">群 ... (Inline text) ...</p>

        <dl>
            <dd style="outline: none;"><span class="mwe-math-element mwe-math-element-inline ai-tx-math-sanitized"><span
                        class="mwe-math-mathml-inline mwe-math-mathml-visible" style="display: inline;"><math
                            xmlns="http://www.w3.org/1998/Math/MathML"
                            alttext="{\displaystyle \rho ({0},{0})={\begin{pmatrix}1&amp;0\\0&amp;1\end{pmatrix}},\quad \rho ({1},{0})={\begin{pmatrix}-1&amp;0\\0&amp;-1\end{pmatrix}},\quad \rho ({0},{1})={\begin{pmatrix}0&amp;1\\1&amp;0\end{pmatrix}},\quad \rho ({1},{1})={\begin{pmatrix}0&amp;-1\\-1&amp;0\end{pmatrix}}.}"
                            style="display: inline;">
                            <semantics>
                                <mrow class="MJX-TeXAtom-ORD">
                                    <mstyle displaystyle="true" scriptlevel="0">
                                        <mi>ρ</mi>
                                        <mo stretchy="false">(</mo>
                                        <mrow class="MJX-TeXAtom-ORD">
                                            <mn>0</mn>
                                        </mrow>
                                        <mo>,</mo>
                                        <mrow class="MJX-TeXAtom-ORD">
                                            <mn>0</mn>
                                        </mrow>
                                        <mo stretchy="false">)</mo>
                                        <mo>=</mo>
                                        <mrow class="MJX-TeXAtom-ORD">
                                            <mrow>
                                                <mo>(</mo>
                                                <mtable rowspacing="4pt" columnspacing="1em">
                                                    <mtr>
                                                        <mtd>
                                                            <mn>1</mn>
                                                        </mtd>
                                                        <mtd>
                                                            <mn>0</mn>
                                                        </mtd>
                                                    </mtr>
                                                    <mtr>
                                                        <mtd>
                                                            <mn>0</mn>
                                                        </mtd>
                                                        <mtd>
                                                            <mn>1</mn>
                                                        </mtd>
                                                    </mtr>
                                                </mtable>
                                                <mo>)</mo>
                                            </mrow>
                                        </mrow>
                                        <mo>,</mo>
                                        <!-- ... Truncated for brevity, but enough to show matrix breakage ... -->
                                    </mstyle>
                                </mrow>
                                <annotation encoding="application/x-tex">...</annotation>
                            </semantics>
                        </math></span></span></dd>
        </dl>
    </div>
</body>

</html>
